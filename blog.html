  <script>
    (function() {
      const list = document.getElementById('blog-list');
      if (!list || typeof BLOG_POSTS === 'undefined') return;
      function stripMarkdown(md) {
        return (md || '').replace(/#{1,6}\s/g, '').replace(/\*\*(.+?)\*\*/g, '$1').replace(/\*(.+?)\*/g, '$1').replace(/`(.+?)`/g, '$1').replace(/^[-*]\s/gm, '').replace(/\[([^\]]+)\]\([^)]+\)/g, '$1').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
      }
      function excerpt(content, len) {
        return (stripMarkdown(content) || '').slice(0, len) + (stripMarkdown(content).length > len ? '…' : '');
      }
      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }
      BLOG_POSTS.forEach(function(post) {
        const a = document.createElement('a');
        a.href = 'blog-post.html?id=' + post.id;
        a.className = 'blog-card';
        a.innerHTML = '<h3>' + escapeHtml(post.title) + '</h3><div class="meta">' + escapeHtml(post.date) + '</div><p class="excerpt">' + escapeHtml(excerpt(post.content, 20)) + '</p>';
        list.appendChild(a);
      });
    })();
  </script>
